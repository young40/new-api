name: Docker Build (Aliyun)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ALIYUN_NAMESPACE: young40/new-api

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}:latest
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}:${{ github.sha }}
          build-args: |
            VITE_BASE_PATH=/new-api
          cache-from: type=gha
          cache-to: type=gha,mode=max
